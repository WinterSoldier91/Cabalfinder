<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cabalfinder Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="grain"></div>
    <header class="hero">
      <p class="eyebrow">Solana Whale Correlation</p>
      <h1>Cabalfinder Control Room</h1>
      <p class="subtitle">Run snapshots, compute cross-token control, and scan whale co-holdings without touching a terminal.</p>
      <div class="actions">
        <button id="runAllBtn" class="btn btn-accent">Run Full Cycle</button>
        <button id="snapshotBtn" class="btn">Snapshot Only</button>
        <button id="correlateBtn" class="btn">Correlate Only</button>
        <button id="refreshBtn" class="btn btn-ghost">Refresh State</button>
      </div>
      <p id="status" class="status">Idle</p>
    </header>

    <main class="grid">
      <section class="card card-wide">
        <h2>Active Scanner</h2>
        <form id="scanForm" class="scan-form">
          <input id="scanMint" type="text" placeholder="Paste token mint address" required />
          <button id="scanSubmitBtn" type="submit" class="btn btn-accent">Scan Whale Overlap</button>
        </form>
        <div id="scanResults" class="table-wrap"></div>
      </section>

      <section class="card">
        <h2>Operator Warnings</h2>
        <div id="warnings"></div>
      </section>

      <section class="card">
        <h2>Recent Alerts</h2>
        <div id="alerts"></div>
      </section>

      <section class="card">
        <h2>Latest Control Rows</h2>
        <div id="controls"></div>
      </section>

      <section class="card card-wide">
        <h2>Token Snapshot Coverage</h2>
        <div id="snapshots"></div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
