<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#02060F"/>
    </linearGradient>
    <linearGradient id="emerald" x1="140" y1="112" x2="372" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34F5B6"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(210)">
      <stop stop-color="#34F5B6" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#34F5B6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="104" stroke="#1F2937" stroke-width="8"/>

  <circle cx="256" cy="256" r="210" fill="url(#glow)"/>

  <!-- Cabalfinder monogram: ring + scan notch -->
  <circle cx="256" cy="256" r="132" stroke="url(#emerald)" stroke-width="34"/>
  <rect x="324" y="182" width="92" height="148" rx="24" fill="url(#bg)"/>
  <rect x="312" y="236" width="124" height="40" rx="20" fill="url(#emerald)"/>

  <!-- Finder pulse -->
  <circle cx="188" cy="256" r="16" fill="url(#emerald)"/>
</svg>
